name: Build & Release App

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache Pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Windows Build
        run: flutter config --enable-windows-desktop

      - name: Install flutter_distributor
        run: dart pub global activate flutter_distributor

      - name: Build & Package Windows
        run: |
          dart pub global run flutter_distributor:main release --name windows

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: modlist-app-windows
          path: dist/
          retention-days: 7

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache Pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Enable macOS Build
        run: flutter config --enable-macos-desktop

      - name: Install flutter_distributor
        run: dart pub global activate flutter_distributor

      - name: Install appdmg
        run: npm install -g appdmg

      - name: Build & Package macOS
        run: |
          dart pub global run flutter_distributor:main release --name macos

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: modlist-app-macos
          path: dist/
          retention-days: 7

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache Pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev rpm patchelf

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Linux Build
        run: flutter config --enable-linux-desktop

      - name: Install flutter_distributor
        run: dart pub global activate flutter_distributor

      - name: Build & Package Linux
        run: |
          dart pub global run flutter_distributor:main release --name linux

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: modlist-app-linux
          path: dist/
          retention-days: 7

  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: modlist-app-windows
          path: artifacts/windows

      - name: Download macOS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: modlist-app-macos
          path: artifacts/macos

      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: modlist-app-linux
          path: artifacts/linux

      - name: Prepare Release Files
        run: |
          mkdir -p release-files
          # Find all zip, dmg, exe, deb, rpm, AppImage files in artifacts folder and copy to release-files
          find artifacts -type f \( -iname "*.zip" -o -iname "*.dmg" -o -iname "*.exe" -o -iname "*.deb" -o -iname "*.rpm" -o -iname "*.appimage" \) -exec cp {} release-files/ \;
          ls -la release-files

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          generate_release_notes: true
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
